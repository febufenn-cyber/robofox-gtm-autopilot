name: Robofox autonomous build charter gate
on:
  pull_request:
  push:
    branches: [main]
permissions: {contents: read}
jobs:
  roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: {submodules: recursive, fetch-depth: 1}
      - {name: Verify charter, run: python3 scripts/verify_autonomous_build_plan.py}
      - {name: Evaluate Phase 8 readiness, run: python3 scripts/verify_autonomous_build_plan.py --phase 8 --readiness --allow-deferred}
      - {name: Evaluate Phase 9 readiness, run: python3 scripts/verify_autonomous_build_plan.py --phase 9 --readiness --allow-deferred}
      - {name: Run roadmap tests, run: "python3 -m unittest discover -s tests/roadmap -p 'test_*.py' -v"}

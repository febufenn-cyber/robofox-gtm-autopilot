name: Robofox autonomous build charter gate
on:
  pull_request:
  push:
    branches: [main]
permissions: {contents: read}
jobs:
  roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: {submodules: recursive, fetch-depth: 1}
      - {run: python3 scripts/verify_autonomous_build_plan.py}
      - {run: python3 scripts/verify_autonomous_build_plan.py --phase 6 --readiness}
      - {run: "python3 -m unittest discover -s tests/roadmap -p 'test_*.py' -v"}

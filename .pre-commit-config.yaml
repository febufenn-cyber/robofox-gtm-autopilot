repos:
  - repo: local
    hooks:
      - id: robofox-phase0
        name: Robofox Phase 0 policy gate
        entry: python3 scripts/verify_phase0.py
        language: system
        pass_filenames: false
      - id: robofox-public-scan
        name: Robofox public repository scan
        entry: python3 scripts/scan_public_repo.py
        language: system
        pass_filenames: false

repos:
  - repo: local
    hooks:
      - {id: robofox-phase0, name: Robofox Phase 0 policy gate, entry: python3 scripts/verify_phase0.py, language: system, pass_filenames: false}
      - {id: robofox-phase1, name: Robofox Phase 1 truth gate, entry: python3 scripts/verify_phase1.py, language: system, pass_filenames: false}
      - {id: robofox-phase2, name: Robofox Phase 2 decision gate, entry: python3 scripts/verify_phase2.py, language: system, pass_filenames: false}
      - {id: robofox-phase3, name: Robofox Phase 3 experiment gate, entry: python3 scripts/verify_phase3.py, language: system, pass_filenames: false}
      - {id: robofox-phase4, name: Robofox Phase 4 execution gate, entry: python3 scripts/verify_phase4.py, language: system, pass_filenames: false}
      - {id: robofox-public-scan, name: Robofox public repository scan, entry: python3 scripts/scan_public_repo.py, language: system, pass_filenames: false}
